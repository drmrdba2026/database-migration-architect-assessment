services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: onprem-sqlserver
    environment:
      SA_PASSWORD: "SqlPass!2024"
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'SqlPass!2024' -C -Q 'SELECT 1'"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  eshop-app:
    build:
      context: ../
      dockerfile: docker/Dockerfile.dotnet
    container_name: onprem-eshop
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:80
      ConnectionStrings__CatalogConnection: "Server=sqlserver,1433;Database=eShopOnWeb;User Id=sa;Password=SqlPass!2024;TrustServerCertificate=True;MultipleActiveResultSets=True;"
      ConnectionStrings__IdentityConnection: "Server=sqlserver,1433;Database=eShopOnWebIdentity;User Id=sa;Password=SqlPass!2024;TrustServerCertificate=True;"
    depends_on:
      sqlserver:
        condition: service_healthy
    ports:
      - "8082:80"

  nginx:
    image: nginx:alpine
    container_name: onprem-nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - eshop-app

volumes:
  sqlserver-data:
