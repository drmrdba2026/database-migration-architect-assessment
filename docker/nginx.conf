events { worker_connections 1024; }

http {
    upstream eshop {
        server eshop-app:80;
    }

    server {
        listen 80;

        location / {
            proxy_pass         http://eshop/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_read_timeout 300s;
        }

        location /health {
            proxy_pass http://eshop/health;
        }
    }
}
